<div class="card shadow-sm">
  <div class="card-header bg-primary text-white">
    <h3 class="mb-0">{{ isEditMode ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới' }}</h3>
  </div>

  <div class="card-body p-4">
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label fw-bold">Mã sản phẩm (Code) <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="code" [readonly]="isEditMode">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Tên sản phẩm <span class="text-danger">*</span></label>
        <input type="text" class="form-control" formControlName="name" placeholder="Nhập tên sản phẩm...">
        @if (productForm.get('name')?.invalid && productForm.get('name')?.touched) {
          <div class="text-danger small mt-1">Tên quá ngắn hoặc bị trống!</div>
        }
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Giá bán (VNĐ)</label>
          <input type="number" class="form-control" formControlName="price">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label fw-bold">Số lượng trong kho</label>
          <input type="number" class="form-control" formControlName="stock">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Hình ảnh sản phẩm</label>
        <input type="file" class="form-control" (change)="onFileChange($event)" accept="image/*">

        @if (isEditMode) {
          <div class="mt-2">
            <small>Ảnh cũ:</small><br>
            <img [src]="'http://localhost:8081/productImage?code=' + currentCode" width="100" class="border p-1" alt="Product Image">
          </div>
        }
      </div>

      <hr>

      <div class="d-flex justify-content-end gap-2 mt-3">
        <button type="button" class="btn btn-secondary px-4" (click)="router.navigate(['/blogs'])">Hủy</button>
        <button type="submit" class="btn btn-success px-5" [disabled]="productForm.invalid">
          {{ isEditMode ? 'Cập nhật ngay' : 'Thêm sản phẩm' }}
        </button>
      </div>

    </form>
  </div>
</div>
