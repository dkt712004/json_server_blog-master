<div class="container mt-4">
  <div class="input-group mb-3">
    <input type="text" class="form-control" placeholder="Tìm theo tên sản phẩm..."
           [(ngModel)]="searchTerm" (keyup.enter)="onSearch()">
    <button class="btn btn-primary" (click)="onSearch()">Tìm kiếm</button>
  </div>

  <table class="table table-hover border">
    <thead class="table-light">
    <tr>
      <th>Mã SP</th>
      <th>Tên sản phẩm</th>
      <th>Vị trí</th>
      <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
      @if (listBlogs.length > 0) {
        @for (item of listBlogs; track item.code; let i = $index) {
          <tr>
            <td>{{ item.code }}</td>
            <td>{{ item.name }}</td>
            <td>{{ getPositionNames(item.position) }}</td>
            <td>
              <a [routerLink]="['/blogs/edit', item.code]" class="btn btn-sm btn-info me-2">Sửa</a>
              <button class="btn btn-sm btn-danger" (click)="onDelete(item.code)">Xóa</button>
            </td>
          </tr>
        }
      } @else {
        <tr>
          <td colspan="4" class="text-center p-4 text-muted">Nhập từ khóa để tìm kiếm sản phẩm...</td>
        </tr>
      }
    </tbody>
  </table>
</div>
